version: '3.8'

services:
  # Infrastructure
  nsw-kafka:
    image: apache/kafka
    container_name: nsw-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://nsw-kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@nsw-kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

  bct-kafka:
    image: apache/kafka
    container_name: bct-kafka
    restart: unless-stopped
    ports:
      - "9093:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://bct-kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@bct-kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

  nsw-mysql:
    image: mysql
    container_name: nsw-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: nsw_adapter
    ports:
      - "3316:3306"

  bct-mysql:
    image: mysql
    container_name: bct-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bct_adapter
    ports:
      - "3326:3306"

  minio:
    image: minio/minio
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"

  # Applications
  nsw-gateway:
    build:
      context: .
      dockerfile: nsw-gateway/Dockerfile
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: nsw-kafka:9092
      SPRING_DATASOURCE_URL: jdbc:mysql://nsw-mysql:3306/nsw_adapter?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
      MINIO_URL: http://minio:9000
    depends_on:
      - nsw-kafka
      - nsw-mysql
      - minio

  nsw-adapter:
    build:
      context: .
      dockerfile: nsw-adapter/Dockerfile
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: nsw-kafka:9092
      SPRING_DATASOURCE_URL: jdbc:mysql://nsw-mysql:3306/nsw_adapter?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
      MINIO_URL: http://minio:9000
      BCT_SOAP_URL: http://bct-gateway:8082/web-services
    depends_on:
      - nsw-kafka
      - nsw-mysql
      - minio
      - bct-gateway

  bct-gateway:
    build:
      context: .
      dockerfile: bct-gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "8082:8082"
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: bct-kafka:9092
      SPRING_DATASOURCE_URL: jdbc:mysql://bct-mysql:3306/bct_adapter?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
      MINIO_URL: http://minio:9000
    depends_on:
      - bct-kafka
      - bct-mysql
      - minio

  bct-adapter:
    build:
      context: .
      dockerfile: bct-adapter/Dockerfile
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: bct-kafka:9092
      SPRING_DATASOURCE_URL: jdbc:mysql://bct-mysql:3306/bct_adapter?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
      MINIO_URL: http://minio:9000
      NSW_SOAP_URL: http://nsw-gateway:8084/web-services
    depends_on:
      - bct-kafka
      - bct-mysql
      - minio

  # Reverse Proxy
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nsw-gateway
      - nsw-adapter
      - bct-gateway
      - bct-adapter
      - minio
